# EMM TUI config
# Colors accept hex (#RRGGBB) or ANSI color numbers ("0"–"255")

colors:
  accent: "#7C3AED"      # border and highlights
  user: "#EDE9FE"        # your message label
  assistant: "#A78BFA"   # agent message text
  system: "#6D28D9"      # system / info / dim text
  header_bg: ""          # header background (empty = terminal default)
  header_fg: "#8B5CF6"   # header text

layout:
  input_height: 3        # textarea height in lines
  show_header: false     # show a top header bar (metadata always shows above input)
  show_status: true      # show the scroll % indicator

input:
  placeholder: "message  (/help)"
