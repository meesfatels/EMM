# EMM TUI config
# Colors accept hex (#RRGGBB) or ANSI color numbers ("0"–"255")

colors:
  accent: "#475569"      # separator and dim elements
  user: "#E2E8F0"        # your message label
  assistant: "#94A3B8"   # agent message text
  system: "#475569"      # system / info text
  header_bg: ""          # header background (empty = terminal default)
  header_fg: "#64748B"   # header text

layout:
  input_height: 3        # textarea height in lines
  show_header: true      # show the top header bar
  show_status: true      # show the scroll % indicator

input:
  placeholder: "message  (/help)"
